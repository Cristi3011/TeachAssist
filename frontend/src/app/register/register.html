<div class="page-center">
    <div class="card">
        <h2>Înregistrează-te</h2>
        <p style="color:var(--muted);margin-bottom:16px">Înregistrează-te pentru a continua</p>

        <form (submit)="onSubmit($event)">
            <div class="form-field">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" [(ngModel)]="model.username" required />
            </div>

            <div class="form-field" style="position:relative">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" [(ngModel)]="model.email" (ngModelChange)="onEmailChange($event)" required />
                <div style="position:absolute; right:8px; top:34px; transform:translateY(-50%);">
                    <ng-container>
                        <span *ngIf="inviteStatus === 'checking'" style="color:var(--muted);">...verific</span>
                        <span *ngIf="inviteStatus === 'yes'" style="color:green">✓ <small *ngIf="inviteRole">({{ inviteRole }})</small></span>
                        <span *ngIf="inviteStatus === 'no'" style="color:red">✕</span>
                    </ng-container>
                </div>
            </div>

            <div class="form-field">
                <label for="password">Parolă</label>
                <input id="password" name="password" type="password" [(ngModel)]="model.password" required />
            </div>

            <div style="display:flex;justify-content:flex-end;margin-top:8px">
                <button class="btn-primary" type="submit" [disabled]="!isFormValid()">Înregistrează-te</button>
            </div>
            
        </form>
    </div>
</div>
